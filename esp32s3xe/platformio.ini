; AMR 2.0 — PlatformIO Configuration
; ESP32-S3 N16R8 — WebSocket + IMU + PID

[platformio]
default_envs = com

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; ── N16R8 Hardware ──
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.flash_mode = dio
board_build.partitions = default_16MB.csv
build_unflags = -DARDUINO_USB_MODE=1
build_flags = 
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=0

lib_deps =
    bblanchon/ArduinoJson@^7.4.2
    links2004/WebSockets@^2.7.3
    tzapu/WiFiManager@^2.0.17
    adafruit/Adafruit SSD1306@^2.5.9
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit MPU6050@^2.2.6
    jandrassy/TelnetStream@^1.3.0
    dancrank/RPLidar (DanCrank fork)@^1.0.2
    adafruit/Adafruit NeoPixel@^1.12.0

; ========================================================
; ENV 1: [com] CÁP USB (CÓ AUTO-FALLBACK NẠP CODE)
; Nạp Code: Auto dò cắm cáp hay chưa. Nhổ cáp -> Tự OTA
; Monitor: Bắt buộc cắm cáp. Nếu không sẽ bắt chọn cổng.
; ========================================================
[env:com]
extra_scripts = pre:auto_fallback.py
upload_speed = 921600
monitor_speed = 115200
monitor_filters = direct

; ========================================================
; ENV 2: [ota] CHUYÊN TRỊ MONITOR VÀ NẠP QUA WIFI (OTA)
; Khi bạn cố tình nhổ cáp thử nghiệm thì chọn Env này
; ========================================================
[env:ota]
upload_protocol = espota
upload_port = 192.168.1.117
monitor_port = socket://192.168.1.117:23
