 
; AMR 2.0 v2 — PlatformIO Configuration
; ESP32-S3 N16R8 — Clean Layered Architecture

[platformio]
default_envs = com

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; ── N16R8 Hardware ──
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.flash_mode = dio
board_build.partitions = default_16MB.csv
build_unflags = -DARDUINO_USB_MODE=1 -std=gnu++11
build_flags = 
    -std=gnu++17
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DWEBSOCKETS_MAX_DATA_SIZE=65536
    -Iinclude
    -Isrc/core
    -Isrc/drivers
    -Isrc/perception
    -Isrc/navigation
    -Isrc/network
    -Isrc/sim

lib_deps =
    bblanchon/ArduinoJson@^7.4.2
    links2004/WebSockets@^2.7.3
    tzapu/WiFiManager@^2.0.17
    adafruit/Adafruit SSD1306@^2.5.9
    adafruit/Adafruit GFX Library@^1.11.9
    jandrassy/TelnetStream@^1.3.0
    dancrank/RPLidar (DanCrank fork)@^1.0.2
    adafruit/Adafruit NeoPixel@^1.12.0

; ========================================================
; ENV 1: [com] USB Cable (Auto-fallback to OTA)
; ========================================================
[env:com]
extra_scripts = pre:auto_fallback.py
upload_speed = 921600
monitor_speed = 115200
monitor_filters = direct

; ========================================================
; ENV 2: [ota] WiFi OTA Upload + Telnet Monitor
; ========================================================
[env:ota]
upload_protocol = espota
upload_port = 192.168.1.89
monitor_port = socket://192.168.1.89:23
